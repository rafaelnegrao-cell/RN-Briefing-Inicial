<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1F3A2E" />
  <title>Respostas · Briefing Dra. Francielle (RN Negrão)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/rn.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-top {
      background: var(--green); color: var(--cream);
      padding: 16px 18px calc(16px + env(safe-area-inset-top));
      padding-top: max(16px, env(safe-area-inset-top));
    }
    .admin-top .row { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 11px; }
    .admin-top img { width: 30px; height: 30px; border-radius: 7px; }
    .admin-top h1 { font-family: var(--serif); font-size: 18px; margin: 0; font-weight: 700; }
    .admin-top span { font-size: 12px; opacity: .8; }
    .admin-wrap { max-width: 860px; margin: 0 auto; padding: 22px 18px 80px; position: relative; z-index: 1; }
    .gate { max-width: 380px; margin: 8vh auto 0; text-align: center; }
    .gate h2 { font-family: var(--serif); color: var(--green); }
    .gate input { margin: 10px 0; }
    .sub-card {
      background: var(--paper-2); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); margin: 0 0 14px; overflow: hidden;
    }
    .sub-card > summary {
      list-style: none; cursor: pointer; padding: 16px 18px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .sub-card > summary::-webkit-details-marker { display: none; }
    .sub-card .who { font-family: var(--serif); font-weight: 700; color: var(--green); font-size: 16px; }
    .sub-card .when { font-size: 12.5px; color: var(--ink-soft); }
    .sub-body { padding: 4px 18px 20px; border-top: 1px solid var(--line-soft); }
    .meta-line { font-size: 13px; color: var(--ink-soft); margin: 12px 0 14px; }
    .answers .qa { padding: 10px 0; border-bottom: 1px solid var(--line-soft); }
    .answers h4 { font-family: var(--serif); color: var(--green); margin: 16px 0 4px; font-size: 15px; }
    .tools { display: flex; gap: 10px; flex-wrap: wrap; margin: 6px 0 16px; }
    .tools button { min-height: 42px; padding: 9px 14px; font-size: 14px; }
    .count { font-size: 13px; color: var(--ink-soft); margin: 0 0 16px; }
    @media print {
      .admin-top, .tools, summary .when, .no-print { display: none !important; }
      .sub-card { box-shadow: none; border: 0; }
      .sub-body { display: block !important; }
      body::before { display: none; }
    }
  </style>
</head>
<body>
  <div class="admin-top">
    <div class="row">
      <img src="assets/rn.png" alt="" />
      <div>
        <h1>Respostas do briefing</h1>
        <span>Consultório Dra. Francielle Delgado · RN Negrão</span>
      </div>
    </div>
  </div>
  <main class="admin-wrap" id="adminApp"></main>
  <script src="questions.js"></script>
  <script src="admin.js"></script>
</body>
</html>
